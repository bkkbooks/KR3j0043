body:
  text: 芥隱筆記雜家類二雜考之屬提要臣等謹案芥隱筆記一卷宋龔頤正撰頤正字養正處州遂昌人本名敦頥光宗受禪改今名為國史院檢討官其書名芥隱筆記者考韓元吉南澗甲乙稿中有題芥隱一詩為頥正而作蓋其書室之名因以名其所著也頥正考證博洽具有根柢而舛謬處亦時有之如韓愈馬上誰家白面郎詩誤以為杜甫公羊傳孔父義形於色誤以為左傳孔子語王昌齡夢中喚作梨花雲詩誤以為王建信乎考證之難然統合全編則精核者居多要不在沈括筆談洪邁隨筆之下未可以卷帙多少為甲乙也每條下多有注語其中班固賓戲一條與正文不相應王安石草堂懷古一條明注異同其王建一條注乃明駁之似非頥正所自注然出自誰手則不可考矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:06bea500a784586608e2c5bc8a72a594bc68954c0988ae5f787259605e5d350b
