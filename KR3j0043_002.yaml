body:
  text: 士非博學之難能審思明辨之為難古人固有耽玩典籍涉獵書記窮年皓首貪多務得者矣然履常蹈故誦書綴文趣了目前不求甚解疑誤相傳莫通倫類漫無所考按也檢討龔公以學問文章知名當世諸公要人爭欲令出我門下自六藝百家諸史之籍無所不讀河圖洛書山鑱冡刻方言地志浮屠老子騷人墨客之文無所不記至於討論典故訂正事實辨明音訓評論文體雖片言隻字必欲推原是正俾學者知所依據此其閒居暇日有得於一時之誦覽者隨而録之故號曰筆記若夫他日當大典冊渙大號令則武夫感泣癃老扶觀當埒燕許輩秉太史筆褒貶是非勸善懲惡凛然有遺直之風回視筆記特翰墨之逰戲耳嘉泰改元孟冬既望汶人劉董跋
