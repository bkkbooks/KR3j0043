body:
  text: 芥隱筆記宋龔頥正撰八十一萬嵗李太白詩云拜龍顔獻聖夀北斗戾南山摧天子九九八十一萬嵗嵗嵗長傾萬夀杯余嘗為聖節詩用八十一萬嵗事或問有所據否因舉此且云道藏雲笈七籖二帙混元聖紀云混元一始萬刼至千百成百成亦八十一萬年而有太初太初之時老君從虚空而下為太初之師又自太上生後復八十一萬億八十一萬嵗乃生一炁禍雙荆公金陵懐古詩逸樂安知與禍雙雙字最佳史龜筴傳禍與福同刑與徳雙聖人察之以知吉㐫擲火萬里流鈴八衝四目杜牧之詩老翁四百牙爪利擲火萬里精神高葢用天蓬呪蒼舌緑齒四目老翁而今本誤以目為百爾擲火萬里亦用度人經擲火萬里流鈴八衝之語而東坡亦用之於芙蓉城詩云仙風鏘然韻流鈴也東坡宸奎閣碑銘東坡宸奎閣碑銘巍巍仁皇體合自然神曜得道非有師傳葢出八師經吾今自然神曜得道非有師也蜂蠆又蜂蠆發於懐䄂出晉書鄒湛對晉文帝曰猛虎在山荷戈而出凡人能之蜂蠆發於懐袖勇夫為之驚駭出於意外也蜂蠆二字東坡屢用之十餘嵗時老蘇令作夏侯太初論有云人能搏猛虎不能無變色於蜂蠆老蘇愛此論年少時所作故不傳東坡作顔樂亭記與黠䑕賦凡兩用之殺之三宥之三東坡試刑賞忠厚之至論其間有云臯陶曰殺之三堯曰宥之三梅聖俞以問蘇出何書答曰想當然耳此語蘇葢宗曹孟徳問孔北海武王伐紂以妲己賜周公出何典答曰以今準古想當然耳一時猝應亦有据依據東漢孔融傳與操書稱武王伐紂以妲己賜周公操不悟後問出何經典對曰以今度之想當然耳退之用字退之孔戣音逵誌銘云孔世三十八吾見其孫白而長身據説文卄而集反二十并也􅧁速達反三十并也册先立反四十并也退之自謂識字故用之為四字銘今刋正書者改作三十八非是案玉篇卄字如拾切二十并也􅧁字先闔切三十也册先入切四十也廣韻二十七合􅧁字音趿二十八盍又收騰驤字老杜瘦馬行此豈有意仍騰驤葢用史記鄒衍此豈有意阿世茍合而已哉意最為竒史記索隱鄒衍執詭怪熒惑諸侯其見禮重武王以仁義伐紂伯夷餓不食周粟衛靈公問陳而孔子不答梁惠王謀欲攻趙孟軻稱太王去邠此豈有意阿世俗茍合而已哉出孟軻傳黄石白猿杜牧之詩授圖黄石老學劒白猿翁葢出庾信宇文盛墓誌云授圖黄石不無師表之心學劒白猿遂得風雲之志折綿冰酒山谷詩霜威能折綿風力欲冰酒葢用阮籍詩陽和微弱隂氣竭海凍不流綿絮折呼吸不通寒冽冽庾肩吾詩勁氣方凝海清威正折綿張説塞上綿應折江南草可結語也退之詩寄崔立之詩歡華不滿眼咎責塞兩儀葢用前漢敘傳福不盈眥旤禍字溢於世文選載班固答賔戲朝為榮華夕而顦顇福不盈眥禍溢於世東坡泗州塔詩耕田欲雨刈欲晴去得順風來者怨葢用劉夢得同蓻于陸其時在澤伊穜之喜乃稑之厄同舟于江其時在風沿者之吉泝者之㓙意杜子美詩東坡謂老杜竊比稷與卨葢求之於其詩舜舉十六相身尊道何高秦時用商鞅法令如牛毛意特有所指余以為見此老容民畜衆之度莫若水深魚極樂林茂鳥知歸又林茂鳥攸歸水深魚知聚重言之此其意有在滕王閣序王勃滕王閣序落霞與孤鶩齊飛秋水共長天一色葢宗庾子山華林園馬射賦序落花與芝葢齊飛楊栁共春旗一色退之用丞輔字田氏先廟碑銘訖其外庸可作丞輔乃用呂氏春秋晉文公出已反國介子推不肯受賞為賦詩曰有龍于飛周徧天下五蛇從之為之丞輔龍反其鄉得其處所四蛇從之得其露雨一蛇羞之槁死于中野而刋正者以丞為承其未知此歟案晉世家文公得歸賞從亡推亦不言禄禄亦不及推母曰與女偕隠至死不復見介子推從者憐之乃懸書宫門曰龍欲上天五蛇為輔陳琳書魏陳琳與曹洪書云縈帶為垣高不可登折箸為械堅不可入葢宗路溫舒畫地為獄議不入刻木為吏期不對太史公亦有畫地為牢執不入削木為吏議不對之言出報任少卿書山谷用巴西字懐半山老人詩山谷詩啜羮不如放麑樂羊終愧巴西按説苑樂羊為魏將以攻中山其子在中山中山懸其子示樂羊樂羊不為衰志攻之愈急中山因烹子而遺之樂羊食之盡一杯中山見其誠也不忍與其戰果下之遂為魏文侯開地文侯賞其功而疑其心孟孫獵得麑使秦西巴持歸其母隨而鳴秦西巴不忍縱而與之孟孫怒而逐秦西巴居一年召以為太子傅左右曰夫秦西巴有罪於君今以為太子傅何也孟孫曰夫以一麑而不忍又將能忍吾子乎山谷謂巴西可乎退之越裳操越裳在交趾之南辨田字越裳操孰荒于門孰治于田四海既均越裳是臣詩定之方中靈雨既零命彼倌人星言夙駕説音税于桑田顔師古急就章注古者田陳聲相近漢童謡邪徑賊良田讒口害善人桂樹華不實黄雀巢其顚易林噬嗑之未濟曰邪徑賊田政惡傷民節之井曰宣髪龍身為王主田閔已賦辨寛字退之閔已賦獨閔閔其曷已兮憑文章以自宣昔顔氏之庶幾兮在隠約而平寛固哲人之細事兮夫子乃嗟歎其賢詩考槃考槃在澗碩人之寛獨寐寤言永矢弗諼寛音區權切裕也寛也諼光元切淮西碑辨謀字莫胡切帝為不聞與神為謀易林比之家人曰懿公淺愚不深受謀夬之乾曰狼戾靡謀無言不殊節之比曰張陳嘉謀賛成復都又淮蔡為亂天子伐之詩死生契濶與子成説執子之手與子偕老于嗟濶兮不我活兮太𤣥斷首決不決爾仇不闕乃後有鉞成公綏天地賦斷鼇足而續毁鍊五色而補缺豈斯事之有徴將言者之虚設何隂陽之難測偉二儀之奓濶陟加切二案晉書文苑傳六十卷成公姓也綏名也字子安為天地賦中云斷鼇足而續毁鍊五石而補缺云云辨古人用牙字吪胡切毛頴傳今日之獲不角不牙衣褐之徒詩祈父予王之爪牙胡轉予于恤靡所止居易林訟之鼎虎聚磨牙以待㹠豬太𤣥首夷其牙或飫之徒豨毅其牙發以張弧急就章款冬貝母薑狼牙亭歴桔梗龜骨枯揚雄豫州箴陪臣執命不慮不圖王室陵遲䘮其爪牙叱胡切齒也古人用山字所旃切退之謝自然詩童騃無所識但聞有神仙輕生學其術乃在金泉山詩斯干秩秩斯干幽幽南山古詩藁砧今何在山上復有山何當大刀頭破鏡飛上天楚詞招魂高堂邃宇檻層軒層臺累榭臨高山網户珠綴刻方連揚雄解嘲藺先生收功於章臺四皓采榮於南山公孫創業於金馬驃騎發迹於祁連史記龜筴傳河雖神賢不如崑崙之山漢書衛霍敘傳飲馬翰海封狼居山西規大河列郡祁連山所㫋切説文山宣也祁連山名謂置郡至此辨口字孔五切元和聖徳詩疆外之險莫過蜀土韋臯去鎮劉闢守後血人于牙不肯吐口詩正月不自我先不自我後好言自口莠言自口憂心愈愈是以有侮正考父昭七年鼎銘一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘於是粥於是以餬余口漢溝洫志白渠之歌田於何所池陽谷口鄭國在前白渠起後舉插為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口上林賦出乎椒邱之闕行乎州淤之浦徑乎桂林之中過乎泱莾之壄汨乎混流順阿而下赴隘陜之口西京賦鄙生生乎三百之外傳聞於未聞之口曾髣髴其若夢未一隅之能覩辨厚字很口切又孩養無告仁滂施厚皇帝神聖通達先古詩巧言蛇蛇碩言出自口矣巧言如簧顔之厚矣易林頥之節曰文王四乳仁愛篤厚枚叔七發即枚乘作七發以諫梁孝王貴人之子必宮居而閨處飲食則溫淳甘膬昌芮切脭呈膿肥厚辨畝字音莫補切各安厥位訓厥甿畮周禮畝字正月元日初見宗祖詩南山蓺麻如之何衡從其畝取妻如之何必告父母易林歸妹之坤曰喘牛傷暑弗能成畆班固西都賦士食舊徳之名氏農服先疇之畎畝商脩族世之所鬻工用高曾之規矩辨垢厚字帝車回來日正當午御丹鳳門大赦天下滌濯剗磢初兩切磨滅瑕垢續功臣嗣㧞賢任耉孩養無告仁滂施厚皇帝神聖通達先古下與厚皆下五切垢與耉皆果羽切詩南山冇臺南山有枸俱甫切有楰勇主切耉為果羽切崔駰慰志賦闢四門以博延兮彼幽牧之我舉分畫定而計決兮豈云賁乎鄙耉陸機愍懐太子文當䆒遐徳登兹黄耉緝熈有晉克壯常宇辨寫字音賞羽切末乃取闢駭汗如寫揮刀紛紜争切膾脯詩蓼蕭零露湑兮我心寫兮是以有譽處兮寫賞羽切諺云書三寫魚成魯帝成虎辨閒字音居賢切退之詩孟東野失子詩彼於女何有乃令蕃且延此獨何罪辜生死旬日閒詩還十畝之閒兮桑者閑閑兮行與子還兮漢李廣傳自以大黄射其裨將服注曰黄肩弩也晉灼曰黄肩即黄閒也上林賦赤瑕駮犖雜插其間鼂采琬琰和氏出焉班固西都賦裛以藻繡絡以編連亦作綸隨侯明月錯落其閒曹植瑟瑟歌東西經七陌南北越九阡卒遇回風起吹我入雲間辨渴字音巨列切送文暢師下開迷惑胸庨哮豁呼括切斸株橜屈僧時不聽瑩若飲水救渴列子黄帝之所聽瑩也詩君子于役日之夕矣牛羊下括古活切君子于役茍無飢渴巨列切易豫之賁曰泉閉澤竭黄庭經時念太倉不飢渴役使六丁神女謁辨乖字音公回切猛虎行自矜無當對氣性縱以乖朝怒殺其子暮還食其妃六月蓼蕭廢則恩澤乖矣湛露廢則萬國離矣漢蘇武詩胡馬失其羣思心常依依何況雙飛龍羽翼臨當乖漢律厯叙傳官失學微六家分乖一彼一此庶研其幾崔駰達㫖淳朴散離人物錯乖高辛攸降厥趣各違王逸九思分紛載矩兮高將咨詢兮皇羲道何臯兮周流路變易兮時乖乖睽也辨稼字音古䕶切送李愿歸盤谷序盤之中維子之宫盤之土維子之稼詩七月九月築場圃十月納禾稼易林豐之未濟曰沾洽時澍生我禾稼小過之大畜雨溢過度傷害禾稼圃音溥故切稼古護切辨角字音廬谷切贈唐衢虎有爪兮牛有角虎可搏兮牛可觸詩麟之趾麟之角振振公族漢律厯志角觸也物觸地而出戴芒角也义曰角於斛切東方朔傳曰臣以為龍又無角謂之為蛇又有足仲長統騰蛇弃鱗神龍䘮角至人能變達士㧞俗郭璞共工贊共工赫怒不周是觸地虧㢲維天缺乾角角音禄見資暇集魯直畫牧牛圖野次小崢嶸幽篁相依緑阿童三尺箠御此老觳觫石吾甚愛之勿遣牛礪角牛礪角尚可牛鬬殘我竹寄裴仲謨詩念公篤行李野飯中道宿驚沙卷旍旗烏尾訛城角辨蛇字音唐河切東方朔詩方朔聞不喜褫身絡蛟蛇瞻相北斗柄兩手自相挼詩羔羊素絲五紽委蛇委蛇易林長尾委蛇畫地成河揚雄反離騷既亡鸞車之幽藹兮駕八龍之委蛇臨江瀕而掩涕兮何有九招與九歌張衡西京賦感河馮懐湘娥驚蝄蜽皆水神憚蛟蛇郭璞流沙賛經帶西極頽溏委蛇注于黒水永溺餘波辨降字音乎攻切劉統軍碑琳後來降公不有功詩草蟲憂心忡忡我心則降孟子曰洚水者洪水也楚辭四用降韻徐邈皆乎攻切揚雄河東賦雪䬠䬠而來迎兮澤滲灕而下降鬱蕭條其幽藹兮滃烏孔切汎沛以豐隆馬融笛賦無相奪倫以宣八風律呂既和哀聲五降阮籍寄懐詩陽精蔽不見隂光代為雄亭亭在須臾厭厭將復降辨售字音時周切送劉師服詩齎財入市賣貴者常難售豈不久憔悴為功忌中休詩谷風賈用不售樂府壠頭水歌將頓樓蘭䣛就解月支裘勿令如李牧功多信不售賈物出手也正䬸字音須倫切餐千安切祭嫂鄭夫人文念寒而衣念飢而䬸音孫疾疹水火無災及身詩伐檀彼君子兮不素餐兮宋玉九辨竊慕詩人之遺風願託乎素餐蹇充詘而無端兮汨莽莽而無垠易林謙之坎曰懸鶉素餐餐非其任失亡遠民實勞我心餐餔也哀字音於希切祭周氏姪女文今當長歸與一世違凡汝親戚孰能不哀詩采薇我心傷悲莫知我哀説文從口衣聲爾雅哀哀懐報徳也裴瑜音衣國語各娶其所有以待所歸兮猗兮違兮心之哀兮宋玉九辨覿杪秋之遥夜兮心憭悷而有哀春秋逴逴而日高兮然惆悵而自悲劉向九歎欲遷志而改操兮心帉結而未離外仿偟而遊覽兮内惻隠以含哀張衡南都賦布緑葉之萋萋敷華蘂之蓑蓑𤣥雲合而重隂谷風起而增哀壹似字退之聖徳詩壹似堯禹壹似葢用禮記夫子之言檀弓孔子過泰山側有婦人哭於墓者而哀夫子使子路問之曰子之哭也壹似重有憂者用泐字荆公常夷甫誌文石可泐也用考工記石有時以泐鄭司農注讀為再扐而後掛之扐謂石解散也荆公押而字荆公在歐公坐分韻送裴如晦知呉江以黯然消魂唯别而已分韻時客與公八人荆公子美聖俞平甫老蘇姚子張焦伯强也時老蘇得而字押談詩究乎而荆公乃又作而字二詩鯨抗波濤風作鱗之而葢用周禮考工記梓人深其爪出其目作其鱗之而注之而頰􅝋也又云春風垂虹亭一杯湖上持傲兀何賓客兩忘我與而最為工君子不欲多上人王蘇之憾未必不稔於此也正老杜自平詩杜詩自平宫中呂太一按唐史有兩呂宦官呂太一為廣南市舶使反注呂太一代宗時為廣南市舶使逐刺史張休而反東坡云自平中呂太一世莫曉其義妄者以為唐有自平宫偶讀元宗實録有宫中呂太一叛於廣南故下有南海收珠之句故下云收兵南海千餘日復何疑而説詩者紛紛不可曉至謂唐有自平宫開元中書舍人呂太一與張嘉正號四俊者又呂寜為太一宫使尤謬作詩下字來歴史記秦虎狼之國也唐史太宗龍鳳之姿而子美昭陵詩云讖歸龍鳳質威定虎狼都各易一字最為妙處洪氏辨證謂急急能鳴鴈輕輕不下鷗能鳴用莊子不下用列子語於此見其用出處下字之法莊子外篇莊子舍於故人之家故人喜殺鴈而烹之豎子請曰一能鳴其一不能鳴請奚殺主人曰殺不能鳴者列子黄帝篇海上之人有好漚鳥者每從漚鳥㳺其父曰吾聞漚鳥皆從汝㳺汝取來吾玩之明日之海上漚鳥舞而不下杜詩古今本不同王仲言自宣城歸得杜甫詩三帙有南唐澄心堂紙有建鄴文房印沈思遠印及勅賜印筆法精妙殆能書者試考一二詩多與今本不同如憶李白詩白也詩無數飄然意不羣清新庾開府豪邁鮑參軍渭北春天樹江東日暮雲何時一樽酒重與話斯文九日詩乃云今朝醉裏為君歡笑倩傍人為正冠及再把茱茰仔細看又芹泥隨燕觜蘂粉上蜂鬚宫草霏霏隨委佩雲近蓬萊常五色酒醒思汗簟已近苦寒夜長貧怪婦愁雨映行宫辱贈詩騎馬誰家白面郎不通姓字麄疎甚忍待江山麗之類不可槩舉也荆公用麥氣字荆公晴日晚風生麥氣麥氣葢用何遜新林分别詩麥氣始清和老杜秦城字三輔黄圖長安故城城南為南斗形城北為北斗形故號斗城何遜咸陽詩云城斗疑連漢老杜秦城近斗杓秦城北斗邊北斗故臨秦而秦中詩春城依北斗郢樹發南枝乃秦城耳劉夢得望賦亦云城依斗兮闌干春亦無義亦不可對郢樹也樂天詩醉翁迂叟東坡之名皆出於白樂天詩云荆公用歸字荆公詩緑攪寒蕪出紅爭暖樹歸妙甚歸字葢用老杜紅入桃花嫰青歸柳葉新李白寒雪梅中盡春風柳上歸意唐老杜花遠重重樹雲輕處處山可作畫本老杜用受字進字逗字老杜受字進字逗字最用工夫吹面受和風脩竹不受暑飛燕受風斜野航恰受兩三人樹濕風凉進山谷進風涼殘生逗江漢遠逗錦江波陰鏗詩有行舟逗遠樹作詩祖述有自謝靈運有雲中辨煙樹天際識歸舟王僧孺有岸際樹難辨雲中鳥易識梁元帝有遠村雲裏出遥船天際歸陰鏗詩有天際晚帆孤天邊看遠樹大江静猶浪老杜所以有江流静猶湧雲中辨煙樹鏗有薄雲巖際出初月波中上杜詩薄雲巖際宿孤月浪中翻鏗有中川聞棹謳杜有中流聞棹謳鏗有花逐下山風杜有雲逐度溪風祖述有自青出於藍也作詩得意句陳去非嘗語先君云吾平生得意十字云開門知有雨老樹半身濕先君故效之作感興詩云夜半微雨濕凌晨春草長謂頥正云吾十字似有味後讀河嶽英靈集閻訪詩荒庭人何許老樹半空腹殷璠謂皎然可佳殆亦有所祖云唐朝酒價眞廟問左右唐朝酒價衆莫能對丁晉公以三百青銅錢對丁晉公對眞廟唐酒價以三百亦出於一時耳若李白金樽清酒斗十千白樂天共把十千酤一斗又軟美仇家酒十千方得斗又十千一斗猶賖飲何况官供不著錢又崔輔國與酤一斗酒恰用十千錢曹子建樂府歸來宴平樂美酒斗十千十千恐未必酒價言酒美而價貴耳八十為八秩禮年八十日有秩故以八十為八秩人道家流用此語白樂天屢用之自注行開第八秩可謂盡天年時俗謂七十以上為開第八秩又云已開第七秩屈指幾多人蒲仄聲桃琵仄聲琶調仄聲笑司仄聲馬樂天詩羌管吹楊柳燕姬酌蒲桃蒲桃太原酒名銀含鑿落盞金屑琵琶槽秦再思記異録温州朱史君有一妓善胡琴忽亡念之追悼詩云魂飛寥廓魄歸煙只住人間十八年昨日施僧裙帶上斷腸猶繫琵琶絃琵字亦從仄聲晉書阮咸傳唐元行沖傳琵琶字並無音唐書音訓外戚傳調笑音調打嫌調笑易飲訝卷波遲調笑抛打曲名卷白波酒令燭淚連盤罍蒲桃又對東溪野枇杷上林賦枇杷蒲桃皆無音四十著緋軍司馬男兒官職未蹉跎一為州司馬三見嵗重陽武元衡亦有唯有白鬚張司馬不言名利尚相從樂天用淵明詩淵明有責子詩雖有五男兒總不好紙筆淵明豈特有女或者謂此詩作於未得子之前容有是理淵明詩弱女雖非男慰情良勝無故樂天云衰病四十身嬌癡三嵗女非男猶勝無慰情時一撫東坡徳星句東坡詩斯人乃徳星遣出虚危間用樂天徳星降人福時雨助嵗功福似嵗星移望如時雨至意東坡用樂天詩格樂天詩去嵗暮春上已共泛洛水中流今嵗暮春上已獨立香山下頭東坡用之為海外上元詩東坡惠州上元夜詩前年侍玉輦端門萬枝燈云云今年江海上雲房寄山僧樂天與子美詩一意老杜安得廣厦千萬間大庇天下寒士俱歡顔嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足樂天百姓多寒誰可捄一身雖煖亦何情安得大裘長萬丈一時都葢洛陽城李商隠詩商隠有㸃竄堯典舜典字塗改清廟生民詩樂天有毛詩三百篇後得文選六十卷中無詩中用愛閒字多病愛閒始見南史王儉傳樂天有經忙始愛閒劉夢得有功成却愛閒杜牧之有愛閒能有幾人來老杜樂天詩語詩中用而今匹如些些耳冷妬他欺我生憎勿留羸垂温暾皆樂天語相仄聲欺有底也自也知差底斬新遮莫皆老杜詩太史公司馬相如賛太史公作司馬相如賛曰春秋推見至隠易本隠之以顯大雅言王公大人徳逮黎庶小雅譏小已之得失其流及上所以言雖外殊其合徳一也而自序曰易著天地陰陽四時五行故長於變禮經紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂樂所以立故長於和春秋辨是非故長於治人魚千里山谷用魚千里事葢出闗尹子以盆為沼以石為隖魚環游之不知其幾千萬里也山谷屢用魚千里字尋師訪道魚千里葢世功名黍一炊又小池已築魚千里隙地仍栽芋百區又爭名朝市魚千里觀道詩書豹一斑北征詩韓詩元和庚寅斗挿子北征詩皇帝二載秋閏八月初吉盧仝月蝕詩元和庚寅斗柄挿子律調黄鍾白樂天賀雨詩皇帝嗣寶厯元和三年冬又苦寒詩八年十二月五日雪紛紛柳耆卿詞語隂鏗有夜雨滴空堦柳耆卿用其語人但知為柳詞耳樂天長恨歌樂天有玉容寂寞淚闌干棃花一枝春帶雨不知又有薔薇詩露垂紅萼淚闌干牧之劻勷字牧之詩塵土驚劻勷樂天委命不劻勷詩用鬭在字詩中用鬭在葢出樂天詩世上爭先從盡上聲汝人閒鬬在不如吾樂天用格是字轉席今新婦轉席唐人已爾樂天春深娶婦家詩云青衣轉上聲氊褥錦繡一條斜蘇小小樂天詩揚州蘇小小人道是夭斜音伊邪反鄭重字前漢王莽傳皇天所以鄭重降符命之意師古言頻煩也又三國志夷狄國家哀汝故鄭重賜汝好物樂天謝庾順之送紫霞綺云千里故人心鄭重一端香綺紫氤氲又交情鄭重金相似季布毁譽史記季布言陛下以一人譽召臣以一人毁去臣乃祖韓非子魯丹曰夫以一言善我必以一言罪我落吾手老杜不意青草湖扁舟落吾手樂天天與愛水人終焉落吾手杜詩用前人意老杜寒日出霧遲清江轉山急亦用陰鏗野日燒中昏山路入江窮意席夀唐書百官志席夀謂器用經久謂之夀考工記犀甲夀百年起於此唐志帷帟則題嵗月席夀三年氊夀五年褥夀七年考工記犀甲夀百年兕甲夀二百年合甲夀三百年裝潢兩字裝潢音黄又音晃染黄紙修治之名本齊民要術案唐百官志較書郎掌較理典籍注云冇學生三十八人令史二人揩書十二人熟紙裝潢匠八人鉗勒梁冀妻孫夀善妖態性鉗忌唐后妃傳舉能鉗勒字葢本漢梁冀妻性鉗忌鉗鋷也言性忌害如鉗之鋷物也女輒切善禁架即禁術也如費長房之術唐書后妃列傳上第二善禁架用後漢徐登傳語徐登傳云但行禁架所療皆除唾手高祖隠太子建成傳云云利兵鏖之唾手可決用九州春秋唾掌語盜亦有道王世充竇建徳傳賛唐王竇傳賛盜亦有道用莊子記盜跖之言左方左方謂簡冊之左唐書亦有此語桑䕃不徙唐書屈突通尉遲敬徳等傳賛桑䕃不徙而大功立劉子云堯之知舜不違桑隂劉子知人篇堯之知舜不違桑隂文王之知呂望不以永日諸史語二李傳賢長城用漢賢於兵十萬騎五千之文房杜傳忠於所事用魏志注語登殺用唐律即時為登即時殺之也律登時殺傷者勿論曲折出李廣傳報天子失軍曲折猶委曲也楊國忠傳以計勝色者昌荀悦之語餌藥唐傳張臯疏人無故不應餌藥出千金方序論云病患已成須勤藥餌故立補養之方平人無事不宜著手經史雜語回鶻傳不一而足用公羊傳文九年又襄二十九年許夷狄者不一而足也蘭亭叙云後之視今亦猶今之視昔用京房傳語房曰臣恐後之視今猶今之視前也唐儒學傳禪其家用東漢叙賛世禪雕籠語掫師用左氏干掫事文藝傳義形於色用左氏孔子語唐書乾没干没乾匿皆同義賈捐之語後漢南匈奴傳語曰父戰於前子死於後弱女乘於亭障孤兒號於道路老母寡妻設虚祭飲泣淚想望歸魂於沙漠之表全用西漢賈捐之語鷙鳥累百不如一鶚史記趙簡子曰鷙鳥累百不如一鶚鄒陽上書亦用之孔文舉薦禰衡又用此語孫權曰云云令䝉討賊誅其首惡曹植用墨子語墨子雖有賢君不愛無功之臣雖有慈父不愛無益之子故曹植自試表云故慈父不能愛無益之子仁君不能畜無用之臣羊祜宗管子語羊祜讓開府表云徳未為人所服而受高爵則使才臣不進功未為人所歸而荷厚禄則使勞臣不勸用管子徳業未明於朝而處尊位者則良臣不進有功未見於國而有重禄者則勞臣不勸倒行逆施史記伍子胥傳吾日暮途遠吾故倒行而逆施之主父偃曰吾日暮故倒行逆施之歐陽建石崇甥也為趙王倫所收臨刑而作文選歐陽堅石臨終詩天網布宏綱投足不獲安劉夢得所以有天網雖寛投足誰厝淵明詩王仲宣七哀詩王仲宣悟彼泉下人喟然傷心肝淵明所以有感彼栢下人安得不為歡子美詩有祖述審言即子美之祖杜審言綰霧青條弱牽風紫蔓長又云寄語洛城風月主明年春色倍還人子美有林花著雨燕脂潤水荇牽風翠帶長又傳語風光共流轉暫時相賞莫相違皆祖述其意古人作文皆有依倣司馬長卿大人賦全用屈平遠遊中語退之送窮文學逐貧賦老杜杜鵑詩模寫鮑照荆公作虎圖行全倣老杜老杜用元自見來東坡所以用之意匠老杜丹青引詔謂將軍拂絹素意匠慘澹經營中意匠慘澹經營中用陸機文賦意司契而為匠老杜倣淮南子語淮南子水清則魚聚木茂而鳥樂所以老杜有林茂鳥攸歸水深魚知聚古人用字王維詩九天閶闔開宫殿萬國衣冠拜冕旒老杜閶闔開黄道衣冠拜紫宸陶淵明日月不肯遲雜詩晨雞不肯鳴飲酒詩老杜有秋天不肯明江平不肯流兵戈不肯休王室不肯微太湖上林賦東注太湖郭璞注曰太湖在呉縣尚書所謂震澤也窫窳封豨鑿齒淮南子應劭注堯之時窫音軋窳音愈封豨鑿齒皆為人害鑿齒齒長五尺似鑿故長楊賦秦封豕其上窫窳其民鑿齒之徒相與摩牙而争之徐凝用界字徐凝瀑布泉詩一條界破青山色東坡以為塵陋故東坡冇不與徐凝洗惡詩天台山賦瀑布飛流而界道所以徐凝有界破青山色孰謂其惡而無所自耶賦云赤城霞起以建標云云崔駰宗揚雄崔駰達㫖譬猶衡陽之林岱隂之麓伐尋抱不為之稀蓺拱把不為之數葢宗揚雄解嘲譬江湖之崖勃解之島乘食證切雁集不為之多雙鳬飛不為之少社日停針線周美成社日停針線葢用張文昌呉楚詞今朝社日停針線有自來矣眞贗字退之與崔十六詩前計頓乖張居然見眞贗贗字字書云偽物也葢出韓非子齊伐魯索饞鼎魯以其鴈往齊曰鴈魯曰眞也古止用鴈字宋景文有眞贗不同物治亂不同目又贗賈亂㕓窳農亂田東坡亦用之茯苓詩山谷亦用之抑鮓宋景文詩蟹美持螯日魚香抑鮓天用楊淵五湖賦連抑鮓雨絶太白詩雨絶無還雲用三國志呉虞翻傳罪弃雨絶陳孔璋檄又曰雨絶於天文選潘岳述哀詩雨絶無還雲花落豈留英東坡用韓非子語韓非子國平則養儒俠難至則用介士所養非所用所用非所養東坡六國論用此語史記韓非傳儒者用文亂法俠者以武犯禁云云所養非所用所用非所養鄂鄂史記趙世家趙簡子有臣曰周舍好直諫舍死簡子每聽朝不悦大夫請辠簡子曰大夫無辠吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舍之鄂鄂是以亡也又商君傳商君曰我治秦孰與五羖大夫賢趙良曰千羊之皮不如一狐之腋千人之諾諾不如一士之鄂鄂必出於此左氏與史遷左氏晉重耳謂季隗曰待我二十五年不來而後嫁對曰我二十五矣又如是而嫁則將就木焉史記晉世家重耳謂其妻曰待我二十五年不來乃嫁其妻笑曰犂二十五年吾冡上栢大矣雖然妾待子天啓之矣左氏閔元年畢萬以是始賞天啓之矣史記晉世家以是始賞天開之矣不當如此史記張釋之傳云吏不當如此耶薛廣徳傳云曉人不當如是耶魏志傳曰事不當爾耶皆有味也豚犢曹子丹佳人生汝兄弟犢耳魏書注劉景升兒子若豚犬耳孫權傳生子當如李亞子吾兒豚犬耳五代史魏曹羲曹爽有無君之心桓範哭曰曹子丹生汝兄弟如犢耳又曹公見孫權舟船器仗軍伍整肅嘆曰生子當如孫仲謀劉景升兒子豚犬耳首䑕史記灌夫傳與長孺共一老禿翁何為首䑕兩端後漢鄧訓傳首施兩端注猶首䑕也西羌傳亦云首施兩端破碎大道前漢夏侯勝傳章句小儒破碎大道後漢楊終傳章句之徒破壞大體下云宜如石渠故事永為後世則緑沉緑檀老杜有苔卧緑沉槍南史有緑沉屏風杜牧之有䏶壓緑檀槍與沉宜相近反水不收光武紀反水不收何進傳覆水不收太白詩雨落不上天水覆難再收光武紀反水不收後悔何及又東坡芙蓉城詩中云芳卿寄謝空丁寜一朝覆水不反缾千石魚巴寡婦清傳水居千石魚陂山居千章之萩萩即萩樹也前漢貨殖傳水居千石魚波波讀為陂言養魚一嵗収千石唐皮日休釣侣詩一斗霜鱗換濁醪注云吳中賣魚論斗酒乃論斤王岐公宗樂天詩王岐公元豐中餞文潞公歸洛詩有精神如破貝州時葢用樂天上裴晉公詩聞説風情筋力健只如初破蔡州時語矢來無鄉山谷作蘇李枯木道士賦有懼夫子之獨立矢來無鄉出韓非子矢來有鄉鄉方也有來從之方則積鐵以備一鄉謂聚鐵一身以備一處則甲之不全者矢來無鄉則鐵室以盡備之謂甲之全者自首至足無不有鐵故曰鐵室備之則體不傷破富貴他人合愼子名到學本黄老富貴他人合貧賤親戚離文選曹顔遠詩又見晉書殷浩傳葢用愼子家富則疎族聚家貧則兄弟離語森如束張景陽密葉日夜疎叢林森如束文選張景陽雜詩叢林森如束唐元稹連昌宫中滿宫竹嵗久無人森似束葢用此東坡過李公擇故居詩四鄰戒莫犯十畝森似束來兹文選古詩何能待來兹用呂氏春秋今兹美禾來兹美麥注兹年也思君令人老文選古詩有思君令人老曹子建有沉憂令人老其本出唯憂用老耳文選古詩思君令人老嵗月忽已晚東坡西江月在惠州作時侍兒朝雲新亡其寓意為朝雲作東坡梅詞不與棃花同夢葢用王建夢中棃花雲詩王昌齡梅花詩落落寞寞路不分夢中喚作棃花雲坡用此語東坡眞蹟東坡四時詞冬詞云眞態生香誰畫得玉奴纖手嗅梅花眞蹟乃云玉如墨莊謂意方全予見孫昌符家坡朱陳詞眞蹟云半依古柳賣黄𤓰今印本多作半依或遷就為牛衣矣往古來今慕容雋傳内李産傳鶡冠子栯枋一術奚足以㳺往古來今事郭為郵晉載記慕容雋曰不可復以西夕之年取笑來今笑啼俱不敢玉臺新詠詠樂昌云笑啼俱不敢李商隠亦云又云啼笑兩難分飢鷹待一呼老杜有飢鷹待一呼白樂天呼鷹正及飢温庭筠飢鷹不待呼呉融飢鷹只待呼金斗熨波白樂天金斗熨波刀剪紋陸龜䝉波平熨不如又天如重熨皺温庭筠緑波如熨豁愁腸王君玉金斗熨沉香又金斗熨秋江劉夢得東坡用字法劉夢得稱韓文云鸞鳳一鳴蜩螗革音東坡有振鬛長鳴萬馬皆瘖五柞三楊柞音作門荆公即事詩五柳柴桑宅三楊白下往來無一事常得見青青荆公次韻酬龔深甫詩云北尋五柞固未憖東挽三楊仍有樛輿地志鍾山本少林木宋時使諸州刺史罷職還者栽松三千株下至郡守各有差焉山之最高峰有五願樹樹柞木也元嘉中百姓祈禱率有驗又李太白白下亭詩驛亭三樹楊正當白下門王詩三楊白下亭西京賦掩長楊而聨五柞又集乎長楊之宫儴佯乎五柞之館此荆公次韻酬龔深甫詩云恩容衰老䕶松楸復得一龔隨我遊講肆劇談兼祖謝舞雩高蹈異求繇北尋五柞固未憖東挽三楊仍有樛陟巘降原從此始但無瑶玉與君舟下又李白金陵白下亭留别詩驛亭三樹楊正當白門吳煙暝長條漢水齧古根荆公用事河南志盧元明侯山記曰漢有王𤣥者隠於此山景帝再徴不屈就其山封侯因以為名唐宋之問侯山詩云王𤣥拜隠侯荆公草堂懐古周顒宅作阿蘭若婁約身歸窣堵波他日隠侯身亦老為尋陳迹到煙蘿世多謂沈約耳不知乃用此王氏事按荆公詩集中有草堂懐古云周顒宅作阿蘭若婁約身歸窣堵波蕙帳銅瓶皆夢事翛然陳迹翳松蘿與此本不同兩存之理絲竹筦絃漢張禹傳後堂理絲竹筦絃故右軍用之蘭亭敘而或者謂昭明所不取其未知班孟堅之詞耶文選不載蘭亭涪翁後漢郭玉傳有父老不知所出嘗漁釣於涪水因號涪翁山谷亦以此為號益部耆舊傳廣陵有老翁釣於涪水自號涪翁後漢郭玉傳亦然山谷責涪州因此為號退之徐偃王銘退之徐偃王廟碑銘秦桀以顚徐繇邈綿葢用揚雄廷尉箴殷以刑顚秦以酷敗之語而意義尤逺退之聨句退之石鼎聨句豕腹脹彭亨乃用詩蕩炰烋于中國注炰烋彭亨也退之詩又澁旋皮卷臠苦開腹膨脝不子也唐書后妃列傳𤣥宗貞順皇后武氏初妃專寵封所生母楊鄭國夫人弟忠國子祭酒信秘書監將遂立皇后御史潘好禮上疏曰禮父母讐不共天春秋子不復讐不子也陛下欲以武氏為后何以見天下士妃再從叔三思也從父延秀也皆干紀亂常天下共疾夫惡木垂䕃志士不息盜泉飛溢廉夫不飲匹夫匹婦況天子乎願愼擇華族稱神祗之心薨年四十餘贈皇后葢用公羊傳隠公十有一年冬十有一月公薨何以不書葬隠之也何隠爾弑也弑則何以不書葬春秋君弑賊不討不書葬以為無臣子也子沈子曰君弑臣不討賊非臣也子不復讐非子也葬生者之事也春秋君弑賊不討不書葬以為不繫乎臣子也芥隠筆記
